<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamer's Paradise Admin</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --neon-green: #22c55e;
            --neon-red: #ef4444;
            --text: #f8fafc;
            --input-bg: #0f172a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: var(--neon-green);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(34, 197, 94, 0.3);
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 900px;
        }

        .card {
            background-color: var(--card);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            border: 1px solid #334155;
            transition: transform 0.2s;
        }

        h2 { margin-top: 0; color: #94a3b8; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        label { font-size: 0.8rem; color: #64748b; margin-left: 5px; }

        input[type="text"], select {
            width: 100%;
            padding: 12px;
            background: var(--input-bg);
            color: white;
            border: 1px solid #475569;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            margin-top: 5px;
        }

        input[type="text"]:focus { border-color: var(--neon-green); outline: none; }

        .timer {
            font-family: 'Courier New', Courier, monospace;
            font-size: 3.2rem;
            font-weight: bold;
            margin: 20px 0;
            color: var(--text);
        }

        .bill {
            font-size: 1.6rem;
            color: var(--neon-green);
            margin-bottom: 20px;
            font-weight: bold;
        }

        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .btn-start { background-color: var(--neon-green); color: #052e16; }
        .btn-stop { background-color: var(--neon-red); color: white; }
        
        button:disabled { background-color: #475569; cursor: not-allowed; }

        .status-dot {
            height: 10px;
            width: 10px;
            background-color: #475569;
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
        }
        .active-dot { background-color: var(--neon-green); box-shadow: 0 0 8px var(--neon-green); }
    </style>
</head>
<body>

    <h1>Gamer's Paradise</h1>

    <div class="dashboard">
        <div class="card" id="card-1">
            <h2><span id="dot-1" class="status-dot"></span>Station 1</h2>
            <div class="input-group">
                <label>Customer Name</label>
                <input type="text" id="name-1" placeholder="Enter Name">
            </div>
            <div class="input-group">
                <label>Controllers</label>
                <select id="ctrl-1">
                    <option value="100">1 Controller (₹100/hr)</option>
                    <option value="150">2 Controllers (₹150/hr)</option>
                    <option value="200">3 Controllers (₹200/hr)</option>
                    <option value="250">4 Controllers (₹250/hr)</option>
                </select>
            </div>
            <div class="timer" id="timer-1">00:00:00</div>
            <div class="bill" id="bill-1">₹0.00</div>
            <button onclick="toggleStation(1)" id="btn-1" class="btn-start">Start Session</button>
        </div>

        <div class="card" id="card-2">
            <h2><span id="dot-2" class="status-dot"></span>Station 2</h2>
            <div class="input-group">
                <label>Customer Name</label>
                <input type="text" id="name-2" placeholder="Enter Name">
            </div>
            <div class="input-group">
                <label>Controllers</label>
                <select id="ctrl-2">
                    <option value="100">1 Controller (₹100/hr)</option>
                    <option value="150">2 Controllers (₹150/hr)</option>
                    <option value="200">3 Controllers (₹200/hr)</option>
                    <option value="250">4 Controllers (₹250/hr)</option>
                </select>
            </div>
            <div class="timer" id="timer-2">00:00:00</div>
            <div class="bill" id="bill-2">₹0.00</div>
            <button onclick="toggleStation(2)" id="btn-2" class="btn-start">Start Session</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
