<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamer's Paradise Admin</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --neon-green: #22c55e;
            --neon-red: #ef4444;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: var(--neon-green);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(34, 197, 94, 0.3);
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 900px;
            margin-top: 20px;
        }

        .card {
            background-color: var(--card);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px rgba(0,0,0,0.5);
        }

        .input-group { margin-bottom: 15px; text-align: left; }
        label { font-size: 0.75rem; color: #94a3b8; margin-left: 5px; }

        input, select {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            color: white;
            border: 1px solid #475569;
            border-radius: 8px;
            margin-top: 5px;
            box-sizing: border-box;
        }

        .timer {
            font-family: monospace;
            font-size: 3rem;
            margin: 15px 0;
            color: #fff;
        }

        .bill {
            font-size: 1.5rem;
            color: var(--neon-green);
            font-weight: bold;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-start { background-color: var(--neon-green); color: #052e16; }
        .btn-stop { background-color: var(--neon-red); color: white; }
    </style>
</head>
<body>

    <h1>Gamer's Paradise</h1>

    <div class="dashboard">
        <div class="card" id="card-1">
            <h2>Station 1</h2>
            <div class="input-group">
                <label>Customer Name</label>
                <input type="text" id="name-1" placeholder="Enter Name">
            </div>
            <div class="input-group">
                <label>Controllers</label>
                <select id="ctrl-1">
                    <option value="100">1 Controller (₹100/hr)</option>
                    <option value="150">2 Controllers (₹150/hr)</option>
                    <option value="200">3 Controllers (₹200/hr)</option>
                    <option value="250">4 Controllers (₹250/hr)</option>
                </select>
            </div>
            <div class="timer" id="timer-1">00:00:00</div>
            <div class="bill" id="bill-1">₹0.00</div>
            <button onclick="toggleStation(1)" id="btn-1" class="btn-start">Start Session</button>
        </div>

        <div class="card" id="card-2">
            <h2>Station 2</h2>
            <div class="input-group">
                <label>Customer Name</label>
                <input type="text" id="name-2" placeholder="Enter Name">
            </div>
            <div class="input-group">
                <label>Controllers</label>
                <select id="ctrl-2">
                    <option value="100">1 Controller (₹100/hr)</option>
                    <option value="150">2 Controllers (₹150/hr)</option>
                    <option value="200">3 Controllers (₹200/hr)</option>
                    <option value="250">4 Controllers (₹250/hr)</option>
                </select>
            </div>
            <div class="timer" id="timer-2">00:00:00</div>
            <div class="bill" id="bill-2">₹0.00</div>
            <button onclick="toggleStation(2)" id="btn-2" class="btn-start">Start Session</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
